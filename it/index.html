<button onclick="copyText('#include <iostream>
    #include <cmath>
    #include <iomanip>
    
    using namespace std;
    
    int main()
    {
    
        int k, n, s;
    
        cout<<"k = ";
        cin>>k;
    
        cout<<"n = ";
        cin>>n;
    
        s=0;
    
        for(int i=0; i<n; i++){
            s += k * pow(2, i);
        }
    
        cout <<"Rezultatas: "<< s << endl;
    
        return 0;
    }')">Snaigės</button>

<script>
function copyText(text) {
    // Create a temporary textarea element
    const textarea = document.createElement('textarea');
    textarea.value = text; // Set the text to copy
    document.body.appendChild(textarea); // Append the textarea to the body
    textarea.select(); // Select the text
    document.execCommand('copy'); // Copy the text to clipboard
    document.body.removeChild(textarea); // Remove the textarea
    alert(`Copied: ${text}`); // Optional: Alert the user
}
</script>
